<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#141414] text-white font-sans min-h-screen">

  <div class="min-h-screen flex items-center justify-center px-6 bg-gradient-to-b from-[#11101d] to-[#141414]">

    <!-- CARD -->
    <div class="w-full max-w-[460px] bg-[#252746] border border-[#8CA9FF]/20 rounded-[28px] shadow-[0_24px_60px_rgba(0,0,0,0.35)] p-9">

      <!-- BRAND -->
      <h1 class="text-[#8CA9FF] text-3xl font-bold mb-2">Nova</h1>

      <p class="text-[#c4c8e5] mb-6 leading-relaxed">
        Masuk untuk melanjutkan ke dashboard pembelajaran interaktif.
      </p>

      <!-- FORM -->
      <form id="loginForm">

        <!-- USERNAME -->
        <div class="mb-4">
          <label class="block text-[#c4c8e5] mb-2 text-sm">Username</label>
          <input 
            id="username"
            class="w-full bg-[#141a35] border border-[#39476f] text-white px-4 py-3 rounded-xl outline-none text-sm focus:border-[#8CA9FF] focus:ring-4 focus:ring-[#8CA9FF]/20 transition"
          />
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
          <label class="block text-[#c4c8e5] mb-2 text-sm">Password</label>
          <input 
            id="password"
            type="password"
            class="w-full bg-[#141a35] border border-[#39476f] text-white px-4 py-3 rounded-xl outline-none text-sm focus:border-[#8CA9FF] focus:ring-4 focus:ring-[#8CA9FF]/20 transition"
          />
        </div>

        <!-- BUTTON -->
        <button 
          type="submit"
          class="w-full mt-4 bg-[#8CA9FF] text-[#131432] font-bold py-3 rounded-xl hover:opacity-95 hover:-translate-y-[1px] transition"
        >
          Masuk
        </button>

        <!-- MESSAGE -->
        <p id="message" class="mt-3 text-sm text-[#ff9a9a] min-h-[22px]"></p>
      </form>

      <!-- NOTE -->
      <p class="mt-4 text-sm text-[#c4c8e5] leading-relaxed">
        Contoh akun: 
        <strong>siswa1 / 1111</strong>, 
        <strong>siswa2 / 2222</strong>, 
        <strong>siswa3 / 3333</strong>
      </p>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
