<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Pembelajaran Matematika</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      margin-top: -10px;
      width: 100%;
      background-color: rgb(0, 149, 255);
      color: white;
      padding: 15px;
      font-size: 24px;
      text-align: center;
    }

    form {
      width: 100%;
      max-width: 400px;
      margin-top: 40px;
      padding: 20px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
      width: 100%;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    h2 {
      margin-top: 20px;
    }

    /* Tablet ke atas */
    @media (min-width: 768px) {
      .container {
        margin-top: -10px;
        font-size: 32px;
        padding: 20px;
      }

      form {
        max-width: 500px;
      }
    }
  </style>
</head>
<body>

  <h1 class="container">📐 Media Pembelajaran Matematika</h1>

  <form onsubmit="event.preventDefault(); prosesHitung();">
    <label>Pilih Materi:</label>
    <select id="materi">
      <option value="pp">Persegi Panjang</option>
      <option value="segitiga">Segitiga</option>
      <option value="lingkaran">Lingkaran</option>
      <option value="volume">Volume Kubus</option>
      <option value="kelilingDatar">Keliling Datar</option>
    </select>
  
    <input type="number" id="nilai1" placeholder="Nilai 1">
    <input type="number" id="nilai2" placeholder="Nilai 2 (opsional)">
  
    <button type="submit">Hitung</button>
  </form>

  <h2 id="hasil"></h2>

  <script>
    const luasPersegiPanjang = (p, l) => p * l;
    const luasSegitiga = (a, t) => 0.5 * a * t;
    const luasLingkaran = r => 3.14 * r * r;
    const volumeKubus = v => v * v * v;
    const kelilingDatar = s => s * s * s * s;

    function tampilkanHasil(nilai) {
      if(nilai >= 1000) {
        hasil.innerText = "Hasil Perhitungan: Hasil Besar " + nilai;
      } else {
        hasil.innerText = "Hasil Perhitungan: Hasil Kecil " + nilai;
      }
    }

    function prosesHitung() {
      const materi = materiSelect.value;
      const n1 = parseFloat(nilai1.value);
      const n2 = parseFloat(nilai2.value);

      if (isNaN(n1)) {
        alert("Nilai belum diisi!");
        return;
      }

      let hasilHitung = 0;

      if (materi === "pp") {
        hasilHitung = luasPersegiPanjang(n1, n2);
      } else if (materi === "segitiga") {
        hasilHitung = luasSegitiga(n1, n2);
      } else if (materi === "lingkaran") {
        hasilHitung = luasLingkaran(n1);
      } else if(materi === "volume") {
        hasilHitung = volumeKubus(n1);
      } else {
        hasilHitung = kelilingDatar(n1);
      }

      tampilkanHasil(hasilHitung);
    }

    const materiSelect = document.getElementById("materi");
    const nilai1 = document.getElementById("nilai1");
    const nilai2 = document.getElementById("nilai2");
    const hasil = document.getElementById("hasil");
  </script>

</body>
</html>
