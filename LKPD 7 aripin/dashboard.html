<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
            <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            
            min-height: 100vh;
        }

        .header {
            background-color: #131432;
            color: #8CA9FF;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }

        button {
            color: white;
            border: 0;
            background-color: #131432;
            font-size: 20px;
            cursor: pointer;
        }

        .dropdown {
            display: flex;
            justify-content: end;
            padding-right: 20px;
        }

        .dropdown-menu {
            list-style: none;
            display: none;
            flex-direction: column;
            padding: 10px;
            width: 150px;
            background: white;
            color: black;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .dropdown-text {
            border-radius: 5px;
            margin-bottom: 10px;
            margin-left: 30px;
            font-size: 16px;
            width: 100px;
            color: #8CA9FF;
            padding: 8px 10px;
            cursor: pointer;
        }

        .dropdown-text:hover {
            width: 100px;
            margin-left: 20px;
            background-color: #8CA9FF;
            color: #131432;
            border-radius: 5px;
            transition: 0.3s;
        }

        .show {
            
            display: block;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            color: white;
        }

        input {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            outline-color: #8CA9FF;
        }


        .btn-login {
            margin-top: 10px;
            padding: 10px;
            background: #8CA9FF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #007ad1;
        }

        .card-container {
            display: flex;
            margin-left: 5px;
        }

        .card {
            background-color: #131432;
            margin: 10px;
            padding: 10px;
            border: 1px solid #8CA9FF;
            border-radius: 7px;
            color: white;
            margin-top: 12px;
        }

        .card h2 {
            font-size: large;
            color: #8CA9FF;
        }

        .card p {
            margin-top: 4px;
        }

        .card button {
            font-size: 16px;
            margin-top: 8px;
            background-color: #8CA9FF;
            color: white;
            padding: 8px 8px 4px 4px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>E-Learning Seni Budaya</h1>
        <button onclick="show()">☰</button>
    </div>

    <div class="dropdown">
        <ul id="dropdown-menu" class="dropdown-menu">
            <li><button class="dropdown-text" onclick="menu('dashboard')">Dashboard</button></li>
            <li><button class="dropdown-text" onclick="menu('register')">Register</button></li>
            <li><button class="dropdown-text" onclick="menu('login')">Login</button></li>
            <li><button class="dropdown-text" onclick="menu('login')">Logout</button></li>
        </ul>
    </div>


</body>
</html>
