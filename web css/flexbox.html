<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Kelas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        /* HEADER (CSS GRID) */
        header {
            display: grid;
            place-items: center;
            background-color: #4f46e5;
            color: white;
            padding: 20px;
        }

        /* LAYOUT UTAMA */
        .container {
            display: flex;
            min-height: 70vh;
        }

        /* SIDEBAR */
        aside {
            width: 250px;
            background-color: #e5e7eb;
            padding: 20px;
        }

        aside ul {
            list-style: none;
        }

        aside li {
            margin-bottom: 10px;
        }

        /* KONTEN UTAMA (FLEXBOX) */
        main {
            flex: 1;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* FOOTER (CSS GRID) */
        footer {
            display: grid;
            place-items: center;
            background-color: #1f2933;
            color: white;
            padding: 15px;
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            aside {
                width: 100%;
            }

            main {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Header</h1>
    </header>

    <div class="container">
        <aside>
            <h3>Menu</h3>
            <ul>
                <li>Beranda</li>
                <li>Anggota Kelas</li>
                <li>Jadwal Pelajaran</li>
                <li>Kontak</li>
            </ul>
        </aside>

        <main>
            <div class="card">
                <h3>Kelas:</h3>
                <p>XI PPLG A</p>
            </div>

            <div class="card">
                <h3>Wali Kelas</h3>
                <p>Bapak Sincung</p>
            </div>

            <div class="card">
                <h3>Tugas:</h3>
                <p>Membuat css flexbox dan grid</p>
            </div>
        </main>
    </div>

    <footer>
        <p>© 2026 Profil Kelas</p>
    </footer>

</body>
</html>
