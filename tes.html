<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Navbar Fixed</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .background {
      background-color: #131432;
      margin: 10px;
      border-radius: 10px;
      height: 300px;
    }

    .nav-wrapper {
      display: flex;
      justify-content: center;
      position: relative;
    }

    /* NAVBAR */
    .navbar {
      border-radius: 0px 0px 25px 25px;
      background: #ffffff;
      padding: 16px 50px;
      display: flex;
      gap: 20px;
      position: relative; 
      /* HAPUS overflow: hidden agar lengkungan terlihat */
    }

    /* LINK STYLE */
    .navbar a {
      text-decoration: none;
      color: #2c2c2c;
      font-size: 16px;
    }

    .navbar .active {
      color: #8CA9FF;
      font-weight: 600;
    }

    /* LENGKUNGAN KIRI & KANAN */
    .navbar::before,
    .navbar::after {
      content: "";
      position: absolute;
      top: -2px;
      width: 25px;  /* Harus sama dengan radius navbar */
      height: 25px; /* Harus sama dengan radius navbar */
      background-color: transparent;
    }

    /* LENGKUNGAN KIRI */
    .navbar::before {
      left: -23px; /* Pindahkan tepat ke sisi luar kiri */
      border-radius: 0 25px 0 0;
      box-shadow: 10px -10px 0 0 #ffffff; /* Mengisi area pojok dengan putih */
    }

    /* LENGKUNGAN KANAN */
    .navbar::after {
      right: -23px; /* Pindahkan tepat ke sisi luar kanan */
      border-radius: 25px 0 0 0;
      box-shadow: -10px -10px 0 0 #ffffff;
    }
  </style>
</head>
<body>
  <div class="background">
      <div class="nav-wrapper">
        <nav class="navbar">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#" class="active">NOVA</a>
          <a href="#">Project</a>
          <a href="#">Team Member</a>
        </nav>
      </div>
  </div>
</body>
</html>
