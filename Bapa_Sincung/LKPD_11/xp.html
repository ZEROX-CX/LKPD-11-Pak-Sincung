<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div class="bg-white text-black p-4 rounded-xl">
        <h2>XP Kamu</h2>
        <p id="xpText">0 XP</p>
        <p id="levelText">Level 0</p>

        <button onclick="tambahXP()"
        class="mt-3 bg-purple-600 text-white px-3 py-2 rounded">
        Kerjakan Tugas (+100 XP)
        </button>
    </div>


    <script>
        let xp = localStorage.getItem("xp") || 0;
        const xpValue = document.getElementById("xpText")

        xpValue.innerText = xp + " XP"
        function tambahXP() {
        xp = parseInt(xp) + 100;
        localStorage.setItem("xp", xp);
        xpValue.innerText = xp + " XP";

        let level = Math.floor(xp / 500);
        document.getElementById("levelText").innerText = "Level " + level;
        }
    </script>

</body>
</html>
